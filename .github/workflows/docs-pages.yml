name: Publish Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "docs-pages"
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PAGES_REPOSITORY: dirtydishes/dirtydishes.github.io
      PAGES_BRANCH: master
      PAGES_PREFIX: islandflow
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build docs index
        run: node scripts/generate-docs-index.mjs

      - name: Prepare static site payload
        run: |
          rm -rf site
          mkdir -p site/docs
          cp -R docs/. site/docs/
          find site -name .DS_Store -delete
          printf '%s\n' '<!doctype html><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=https://dirtydishes.github.io/islandflow/docs/"><title>Islandflow Docs</title><a href="https://dirtydishes.github.io/islandflow/docs/">Continue to docs</a>' > site/index.html
          touch site/.nojekyll

      - name: Check docs payload
        run: |
          node scripts/check-docs-pages-mirror.mjs \
            --source docs \
            --payload site \
            --expected-docs-url "https://dirtydishes.github.io/${PAGES_PREFIX}/docs/"

      - name: Verify Pages publish token
        env:
          DOCS_PAGES_TOKEN: ${{ secrets.DOCS_PAGES_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOCS_PAGES_TOKEN}" ]; then
            echo "::error::DOCS_PAGES_TOKEN is required to publish islandflow docs to ${PAGES_REPOSITORY}."
            exit 1
          fi

      - name: Checkout GitHub Pages site
        uses: actions/checkout@v5
        with:
          repository: ${{ env.PAGES_REPOSITORY }}
          ref: ${{ env.PAGES_BRANCH }}
          token: ${{ secrets.DOCS_PAGES_TOKEN }}
          path: pages
          fetch-depth: 0

      - name: Mirror docs into Pages site
        run: |
          set -euo pipefail
          mkdir -p "pages/${PAGES_PREFIX}"
          rm -rf "pages/${PAGES_PREFIX}/docs"
          cp -R site/docs "pages/${PAGES_PREFIX}/docs"
          cp site/index.html "pages/${PAGES_PREFIX}/index.html"
          touch pages/.nojekyll

      - name: Check Pages mirror
        run: |
          node scripts/check-docs-pages-mirror.mjs \
            --source docs \
            --payload site \
            --published "pages/${PAGES_PREFIX}" \
            --expected-docs-url "https://dirtydishes.github.io/${PAGES_PREFIX}/docs/"

      - name: Commit and push Pages mirror
        run: |
          set -euo pipefail
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${PAGES_PREFIX}" .nojekyll

          if git diff --cached --quiet; then
            echo "No docs changes to publish."
            exit 0
          fi

          git commit -m "publish islandflow docs from ${GITHUB_SHA}"
          git push origin "HEAD:${PAGES_BRANCH}"
